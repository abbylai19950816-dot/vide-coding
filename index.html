(function(){
  var CURRENT_VERSION = '20260513-001';
  // Store version in sessionStorage to avoid re-checking in same session
  if(sessionStorage.getItem('app_version')===CURRENT_VERSION) return;
  sessionStorage.setItem('app_version', CURRENT_VERSION);
  // If localStorage has an old version, clear stale cache and reload fresh
  var storedVer = localStorage.getItem('app_version');
  if(storedVer && storedVer !== CURRENT_VERSION){
    // Clear booking_cfg and slots cache so fresh data is fetched
    localStorage.removeItem('pilates_booking_cfg');

    localStorage.setItem('app_version', CURRENT_VERSION);
    // Reload bypassing cache
    window.location.replace(window.location.href.split('?')[0] + '?v=20260513-001');
    return;
  }
  localStorage.setItem('app_version', CURRENT_VERSION);
})();

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
const firebaseConfig={apiKey:"AIzaSyDksa4iYf3aGqhKi9cp-WfDJrtOh_utX1U",authDomain:"gyrobooking-fbfd5.firebaseapp.com",projectId:"gyrobooking-fbfd5",storageBucket:"gyrobooking-fbfd5.firebasestorage.app",messagingSenderId:"46281828012",appId:"1:46281828012:web:abde543029136cce332109"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const DB_KEYS=['slots','booking_cfg'];  // student page only needs these two
const FLAGS_DEFAULT={maintenanceMode:false,allowBooking:true,appVersion:'1.0.0'};
let _flagsCache=null;
window._fb={
  async get(key){
    try{
      const snap=await getDoc(doc(db,'data',key));
      if(snap.exists()){const v=snap.data().value;localStorage.setItem('pilates_'+key,JSON.stringify(v));return v;}
    }catch(e){console.warn('fbGet',key,e);}
    try{return JSON.parse(localStorage.getItem('pilates_'+key)||(key==='booking_cfg'?'{}':'[]'));}catch{return key==='booking_cfg'?{}:[];}
  },
  async set(key,value){
    localStorage.setItem('pilates_'+key,JSON.stringify(value));
    try{await setDoc(doc(db,'data',key),{value,updated:Date.now()});}catch(e){console.warn('fbSet',key,e);}
  },
  subscribe(key,cb){return onSnapshot(doc(db,'data',key),snap=>{if(snap.exists())cb(key,snap.data().value);},e=>console.warn('listener',key,e));},
  subscribeAll(cb){DB_KEYS.forEach(k=>this.subscribe(k,cb));},
  // flags — cached in memory, single getDoc on first call only
  async getFlags(){
    if(_flagsCache) return {..._flagsCache};
    try{const snap=await getDoc(doc(db,'web_config','flags'));_flagsCache=snap.exists()?{...FLAGS_DEFAULT,...snap.data()}:{...FLAGS_DEFAULT};}
    catch(e){_flagsCache={...FLAGS_DEFAULT};}
    return {..._flagsCache};
  },
  subscribeFlags(cb){
    return onSnapshot(doc(db,'web_config','flags'),snap=>{
      if(snap.exists()){_flagsCache={...FLAGS_DEFAULT,...snap.data()};cb({..._flagsCache});}
    },e=>console.warn('flagsListener',e));
  }
};
// Pre-fetch public data immediately (no auth needed with updated Firestore rules)
// Then sign in anonymously for write operations
(async ()=>{
  try{
    const [cfgSnap, slotsSnap, flagsSnap] = await Promise.all([
      getDoc(doc(db,'data','booking_cfg')),
      getDoc(doc(db,'data','slots')),
      getDoc(doc(db,'web_config','flags')),
    ]);
    if(cfgSnap.exists()) localStorage.setItem('pilates_booking_cfg', JSON.stringify(cfgSnap.data().value));
    if(slotsSnap.exists()) localStorage.setItem('pilates_slots', JSON.stringify(slotsSnap.data().value));
    if(flagsSnap.exists()) _flagsCache={...FLAGS_DEFAULT,...flagsSnap.data()};
  }catch(e){ console.warn('pre-fetch failed',e); }
  // Sign in anonymously for write operations (booking submissions)
  signInAnonymously(auth).catch(e=>console.warn('anon auth optional:',e));
  // Signal ready regardless of auth state
  window._fbReady=true;
  window.dispatchEvent(new Event('firebase-ready'));
  if(typeof window._onFirebaseReady === 'function') window._onFirebaseReady();
})();
</script>

<script>
const BK_DEFAULT={teacherName:"嬋柔老師",lineId:"",classTypes:[{id:1,name:"一對一",icon:"🧘",desc:"專屬個人訓練",plans:[{id:1,sessions:10,name:"10堂套票",price:6000,validDays:180,makeup:true,flex:true},{id:2,sessions:5,name:"5堂體驗",price:3200,validDays:90,makeup:true,flex:true},{id:3,sessions:1,name:"單堂",price:700,validDays:30,makeup:false,flex:false}]},{id:2,name:"一對二",icon:"🤸",desc:"雙人共同練習",plans:[{id:1,sessions:10,name:"10堂套票",price:4500,validDays:180,makeup:true,flex:true},{id:2,sessions:1,name:"單堂",price:500,validDays:30,makeup:false,flex:false}]},{id:3,name:"團課",icon:"🌿",desc:"小班制，最多6人",plans:[{id:1,sessions:20,name:"20堂套票",price:5500,validDays:180,makeup:true,flex:false},{id:2,sessions:10,name:"10堂套票",price:3000,validDays:180,makeup:true,flex:false},{id:3,sessions:1,name:"單堂",price:400,validDays:30,makeup:false,flex:false}]}],formFields:[
    {id:'name',   label:'你的姓名',                  type:'text',     required:true,  enabled:true},
    {id:'phone',  label:'手機號碼',                  type:'tel',      required:true,  enabled:true},
    {id:'social', label:'LINE 或 Instagram ID',      type:'text',     required:true,  enabled:true},
    {id:'note',   label:'備註（身體狀況、時間偏好等）', type:'textarea', required:false, enabled:true},
  ],infoBlocks:[{icon:"🌿",title:"什麼是墊上嬋柔？",body:"結合柔軟、呼吸與身心覺察的全身性運動，適合各年齡層，不需要任何基礎。"},{icon:"📍",title:"上課地點",body:"台南市，詳細地址於預約確認後提供。"},{icon:"💳",title:"付款方式",body:"現金 / 轉帳 / Line Pay，第一次上課前完成付款即可。"},{icon:"🔄",title:"彈性補課",body:"提前告知即可協調補課，套票堂數不浪費。"}]};
function loadCfg(){try{const r=localStorage.getItem("pilates_booking_cfg");if(!r)return BK_DEFAULT;const s=JSON.parse(r);return{teacherName:s.teacherName||BK_DEFAULT.teacherName,lineId:s.lineId||"",heroTitle:s.heroTitle||BK_DEFAULT.heroTitle,heroSub:s.heroSub||BK_DEFAULT.heroSub,footerText:s.footerText||BK_DEFAULT.footerText,classTypes:(s.classTypes&&s.classTypes.length)?s.classTypes:BK_DEFAULT.classTypes,infoBlocks:(s.infoBlocks&&s.infoBlocks.length)?s.infoBlocks:BK_DEFAULT.infoBlocks,formFields:(s.formFields&&s.formFields.length)?s.formFields:BK_DEFAULT.formFields};}catch{return BK_DEFAULT;}}
function loadSlots(){try{return JSON.parse(localStorage.getItem("pilates_slots")||"[]");}catch{return[];}}
function loadPayments(){try{return JSON.parse(localStorage.getItem("pilates_payments")||"[]");}catch{return[];}}
// savePayments and saveSlots defined below with Firebase sync
const DAYS=["日","一","二","三","四","五","六"];
let cfg=loadCfg();
let selTypeId=null,selPlanId=null,bookingData=null;
let schFilterTypeId=null,selSlotId=null;

function switchTab(tab){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+tab).classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  if(tab==="schedule")renderSchedule();
}

function renderPurchase(){
  cfg=loadCfg();
  document.getElementById("heroBadge").textContent=(cfg.teacherName||"嬋柔老師")+" · 課程報名";
  document.getElementById("footerName").textContent=cfg.teacherName||"嬋柔老師";
  const ftEl=document.getElementById("footerText");
  if(ftEl) ftEl.textContent=cfg.footerText||"用心陪伴每一位學員";
  const htEl=document.getElementById("heroTitle");
  if(htEl){
    const parts=(cfg.heroTitle||"找到屬於你的課程節奏").split(/課程節奏|課程/);
    if(parts.length>1) htEl.innerHTML=parts[0]+'<br><em>'+(cfg.heroTitle||'').replace(parts[0],'')||'課程節奏'+'</em>';
    else htEl.textContent=cfg.heroTitle||"找到屬於你的課程節奏";
  }
  const hsEl=document.getElementById("heroSub");
  if(hsEl) hsEl.textContent=cfg.heroSub||"選擇適合你的課程類型與方案";
  document.getElementById("infoBlocks").innerHTML=(cfg.infoBlocks||[]).map(b=>`<div class="info-row"><span class="info-icon">${b.icon||"•"}</span><span class="info-text"><strong>${b.title||""}</strong><br>${b.body||""}</span></div>`).join("");
  renderTypeCards();
  renderFormFields(cfg);
}

function renderFormFields(cfg){
  const fields=loadCfg().formFields||[  // always fresh from localStorage/Firebase
    {id:'name',   label:'你的姓名',                  type:'text',     required:true,  enabled:true},
    {id:'phone',  label:'手機號碼',                  type:'tel',      required:true,  enabled:true},
    {id:'social', label:'LINE 或 Instagram ID',      type:'text',     required:true,  enabled:true},
    {id:'note',   label:'備註（身體狀況、時間偏好等）', type:'textarea', required:false, enabled:true},
  ];
  const wrap=document.getElementById('dynFormFields');
  if(!wrap) return;
  const PLACEHOLDER={name:'請輸入姓名',phone:'0912-345-678',social:'LINE ID 或 @Instagram 帳號',note:'選填，有任何想告訴老師的都可以寫'};
  wrap.innerHTML=fields.filter(f=>f.enabled!==false).map(f=>{
    const req=f.required?`<span style="color:var(--warn)"> *</span>`:'';
    if(f.type==='textarea')
      return `<div class="field"><label>${f.label}${req}</label><textarea id="f-${f.id}" placeholder="${PLACEHOLDER[f.id]||''}"></textarea></div>`;
    return `<div class="field"><label>${f.label}${req}</label><input type="${f.type||'text'}" id="f-${f.id}" placeholder="${PLACEHOLDER[f.id]||''}" ${f.required?'required':''}></div>`;
  }).join('');
}

function renderTypeCards(){
  const types=cfg.classTypes||[];
  const wrap=document.getElementById("typeCards");
  if(!types.length){wrap.innerHTML="<div style='text-align:center;padding:32px;color:var(--ink-mid);font-size:13px'>尚未設定課程類型</div>";return;}
  wrap.innerHTML=types.map(t=>{
    const minPer=t.plans&&t.plans.length?Math.min(...t.plans.map(p=>Math.round(p.price/Math.max(p.sessions,1)))):0;
    return `<div class="type-card ${selTypeId===t.id?"selected":""}" onclick="selectType(${t.id})"><div class="type-card-left"><div class="type-icon">${t.icon||"🌿"}</div><div><div class="type-name">${t.name}</div><div class="type-sub">${t.desc||""}</div></div></div><div class="type-price-box"><div class="type-price-from">單堂起</div><div class="type-price-amt">$${minPer.toLocaleString()}</div></div></div>`;
  }).join("");
}

function selectType(typeId){
  selTypeId=typeId;selPlanId=null;
  const type=cfg.classTypes.find(t=>t.id===typeId);
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="";
  document.getElementById("step2Label").textContent=(type?.icon||"")+" "+type?.name;
  renderPlanCards(type);
  document.getElementById("formWrap").style.display="none";
  document.getElementById("hintWrap").classList.remove("show");
}

function backToStep1(){
  selTypeId=null;selPlanId=null;
  document.getElementById("step1").style.display="";
  document.getElementById("step2").style.display="none";
  document.getElementById("formWrap").style.display="none";
  document.getElementById("hintWrap").classList.remove("show");
  renderTypeCards();
}

function renderPlanCards(type){
  const plans=type?.plans||[];
  const sorted=[...plans].sort((a,b)=>b.sessions-a.sessions);
  const tagMap=["pt-best","pt-pop","pt-flex"];
  const tagLabel=["最優惠","熱門","體驗"];
  document.getElementById("planCards").innerHTML=plans.map(p=>{
    const rank=sorted.findIndex(s=>s.id===p.id);
    const per=Math.round(p.price/Math.max(p.sessions,1));
    const sel=selPlanId===p.id;
    const feats=[];
    if(p.sessions>1&&p.validDays)feats.push(p.validDays+"天效期");
    if(p.makeup)feats.push("可補課");
    if(p.flex)feats.push("彈性時段");
    return `<div class="plan-card ${rank===0&&p.sessions>1?"featured":""} ${sel?"selected":""}" onclick="selectPlan(${p.id})"><div class="plan-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="plan-top"><div class="plan-left">${rank<3&&p.sessions>1?`<span class="plan-tag ${tagMap[rank]}">${tagLabel[rank]}</span>`:""}<div class="plan-name">${p.name}</div><div class="plan-desc">${p.sessions} 堂課</div></div><div class="plan-right"><div class="plan-price">$${p.price.toLocaleString()}</div><div class="plan-price-sub">NT 元</div>${p.sessions>1?`<div class="plan-per">= $${per}/堂</div>`:""}</div></div>${feats.length?`<div class="plan-feats">${feats.map(f=>`<span class="plan-feat">${f}</span>`).join("")}</div>`:""}</div>`;
  }).join("");
}

function selectPlan(planId){
  selPlanId=planId;
  const type=cfg.classTypes.find(t=>t.id===selTypeId);
  renderPlanCards(type);
  const plan=type?.plans.find(p=>p.id===planId);
  if(plan){
    document.getElementById("fpName").textContent=(type?.name||"")+" · "+plan.name;
    document.getElementById("fpPrice").textContent="NT$ "+plan.price.toLocaleString();
    document.getElementById("hintWrap").classList.add("show");
    document.getElementById("formWrap").style.display="block";
  }
}

function scrollToForm(){document.getElementById("formWrap").scrollIntoView({behavior:"smooth",block:"start"});}

function formatPhone(raw){
  const digits=(raw||"").replace(/\D/g,"");
  if(digits.length===10) return digits.slice(0,4)+"-"+digits.slice(4,7)+"-"+digits.slice(7);
  if(digits.length===9) return digits.slice(0,3)+"-"+digits.slice(3,6)+"-"+digits.slice(6);
  return raw; // return as-is if doesn't match
}

function submitPurchase(){
  const name=(document.getElementById("f-name")?.value||document.getElementById("fname")?.value||"").trim();
  const phoneRaw=(document.getElementById("f-phone")?.value||document.getElementById("fphone")?.value||"").trim();
  const social=(document.getElementById("f-social")?.value||document.getElementById("fsocial")?.value||"").trim();
  const note=(document.getElementById("f-note")?.value||document.getElementById("fnote")?.value||"").trim();
  if(!name){alert("請填寫姓名");document.getElementById("fname")?.focus();return;}
  if(!phoneRaw){alert("請填寫手機號碼");document.getElementById("fphone")?.focus();return;}
  const phoneDigits=phoneRaw.replace(/\D/g,"");
  if(phoneDigits.length < 10){alert("手機號碼請填寫完整 10 碼");document.getElementById("fphone")?.focus();return;}
  if(!phoneDigits.startsWith("09")){alert("手機號碼需以 09 開頭（例如 0912345678）");document.getElementById("fphone")?.focus();return;}
  // Dynamic validation based on formFields config
  const _fields = loadCfg().formFields || [];
  const _socialField = _fields.find(f=>f.id==='social');
  if(_socialField?.enabled!==false && _socialField?.required!==false && !social){
    alert('請填寫 '+(_socialField?.label||'LINE 或 Instagram ID'));
    (document.getElementById('f-social')||document.getElementById('fsocial'))?.focus(); return;
  }
  // Validate any custom required fields
  for(const f of _fields){
    if(f.id==='name'||f.id==='phone'||f.id==='social'||f.id==='note') continue;
    if(f.enabled!==false && f.required){
      const val=(document.getElementById('f-'+f.id)?.value||'').trim();
      if(!val){ alert('請填寫 '+f.label); document.getElementById('f-'+f.id)?.focus(); return; }
    }
  }
  const phone=formatPhone(phoneRaw);
  const type=cfg.classTypes.find(t=>t.id===selTypeId);
  const plan=type?.plans.find(p=>p.id===selPlanId);
  if(!type||!plan){alert("請先選擇課程類型與方案");return;}

  const today=new Date(Date.now()+8*3600000).toISOString().split('T')[0];
  const newId=Date.now();

  // Find or create student — match by phone digits OR LINE/Instagram ID
  try{
    const COLORS=["c0","c1","c2","c3","c4"];
    const stuList=JSON.parse(localStorage.getItem("pilates_students")||"[]");
    const pDigits=phone.replace(/\D/g,"");
    const socLow=(social||"").trim().toLowerCase();
    const stuIdx=stuList.findIndex(s=>{
      const sp=(s.phone||"").replace(/\D/g,"");
      const ss=(s.line||"").trim().toLowerCase();
      return (pDigits&&sp===pDigits)||(socLow&&ss===socLow);
    });
    if(stuIdx>=0){
      if(!stuList[stuIdx].phone&&phone) stuList[stuIdx].phone=phone;
      if(!stuList[stuIdx].line&&social) stuList[stuIdx].line=social;
    } else {
      stuList.push({id:newId,name:name,phone:phone,line:social||"",joined:today,
        ecName:"",ecRel:"",ecPhone:"",notes:note,
        color:COLORS[stuList.length%COLORS.length],fromBooking:true});
    }
    saveStudents(stuList);  // triggers Firebase sync
  }catch(e){}

  // Create payment record
  const payments=loadPayments();
  // Link payment to existing student if found by phone/social
  let linkedStudentId=newId;
  try{
    const stuList2=JSON.parse(localStorage.getItem("pilates_students")||"[]");
    const phoneDigits2=phone.replace(/\D/g,"");
    const inSocial2=(social||"").trim().toLowerCase();
    const found2=stuList2.find(s=>{
      const sPhone=(s.phone||"").replace(/\D/g,"");
      const sSocial=(s.line||"").trim().toLowerCase();
      return (phoneDigits2&&sPhone===phoneDigits2)||(inSocial2&&sSocial&&sSocial===inSocial2);
    });
    if(found2) linkedStudentId=found2.id;
  }catch(e){}
  payments.push({id:newId+1,studentId:linkedStudentId,studentName:name,color:"c0",item:type.name+"・"+plan.name,amount:plan.price,date:today,method:"待確認",status:"unpaid",note:"LINE/Instagram："+(social||"—")+(note?" "+note:"")});
  savePayments(payments);

  bookingData={name,phone,social,note,type,plan};
  document.getElementById("successDetail").innerHTML=`<div class="sc-row"><span class="sc-label">姓名</span><span class="sc-val">${name}</span></div><div class="sc-row"><span class="sc-label">類型</span><span class="sc-val">${type.icon||""} ${type.name}</span></div><div class="sc-row"><span class="sc-label">方案</span><span class="sc-val">${plan.name}</span></div><div class="sc-row"><span class="sc-label">金額</span><span class="sc-val">NT$ ${plan.price.toLocaleString()}</span></div>${phone?`<div class="sc-row"><span class="sc-label">電話</span><span class="sc-val">${phone}</span></div>`:""}`;
  document.getElementById("lineBtn").style.display=cfg.lineId?"flex":"none";
  document.getElementById("successOverlay").classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
}

function openLine(){
  if(!bookingData)return;
  const {name,phone,note,type,plan}=bookingData;
  const msg=`【嬋柔課程預約申請】\n姓名：${name}\n類型：${type.icon||""} ${type.name}\n方案：${plan.name}（NT$${plan.price.toLocaleString()}）${phone?"\n電話："+phone:""}${note?"\n備註："+note:""}\n\n請老師確認，謝謝！`;

}

function resetPurchase(){
  selTypeId=null;selPlanId=null;bookingData=null;
  document.getElementById("successOverlay").classList.remove("show");

let verifiedName = null;
let verifiedTypeId = null;   // the type ID from the paid payment

function verifyAndLoadSchedule(){
  const name = (document.getElementById("sch-name-input")?.value||"").trim();
  if(!name){ showSchMsg("請填寫姓名"); return; }
  const payments = loadPayments();
  // Look for any payment (paid or unpaid) for this name to determine type
  // Priority: paid > unpaid (most recent)
  const myPayments = payments.filter(p=>p.studentName&&p.studentName.trim()===name);
  const paidPayments = myPayments.filter(p=>p.status==="paid");
  const hasAny = myPayments.length > 0;
  const hasPaid = paidPayments.length > 0;
  if(!hasAny){
    showSchMsg("找不到「"+name+"」的紀錄，請確認姓名或聯絡老師");
    return;
  }
  if(!hasPaid){
    showSchMsg("「"+name+"」的費用尚未確認，請聯絡老師完成繳費後再預約");
    return;
  }
  // Match type from most recent paid payment
  const cfg2 = loadCfg();
  let matchedTypeId = null;
  for(const p of paidPayments.slice().reverse()){
    const itemName = (p.item||"").split("・")[0].trim();
    const found = cfg2.classTypes?.find(t=>t.name===itemName);
    if(found){ matchedTypeId = found.id; break; }
  }
  verifiedName = name;
  verifiedTypeId = matchedTypeId;
  document.getElementById("sch-verify-msg").style.display="none";
  document.getElementById("sch-verify-bar").style.display="none";
  document.getElementById("sch-verified-content").style.display="block";
  const cfg3 = loadCfg();
  const type = matchedTypeId ? cfg3.classTypes?.find(t=>t.id===matchedTypeId) : null;
  document.getElementById("sch-type-badge").innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;padding:4px 0 8px">'
    +'<div style="background:var(--sage-light);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:500;color:var(--sage-deep)">'
    +(type?type.icon+" "+type.name:"全部課程")
    +'</div><div style="font-size:12px;color:var(--ink-mid)">的可預約時段</div>'
    +'<button onclick="resetVerify()" style="margin-left:auto;background:transparent;border:none;font-size:12px;color:var(--ink-light);cursor:pointer;font-family:inherit">← 重新輸入</button>'
    +'</div>';
  renderSlotList();
}

function resetVerify(){
  verifiedName=null; verifiedTypeId=null; selSlotId=null;
  document.getElementById("sch-verify-bar").style.display="block";
  document.getElementById("sch-verified-content").style.display="none";
  document.getElementById("sch-verify-msg").style.display="none";
  document.getElementById("schBookBar").classList.remove("show");
}

function showSchMsg(msg){
  const el=document.getElementById("sch-verify-msg");
  el.textContent=msg; el.style.display="block";
}

function renderSchedule(){
  // If already verified (e.g. came from purchase), keep showing content
  if(verifiedName){
    document.getElementById("sch-verify-bar").style.display="none";
    document.getElementById("sch-verified-content").style.display="block";
    renderSlotList();
    return;
  }
  // Not verified — show input bar
  document.getElementById("sch-verify-bar").style.display="block";
  document.getElementById("sch-verified-content").style.display="none";
  document.getElementById("sch-verify-msg").style.display="none";
}

// Called from goToSchedule() after successful purchase — auto-fill name and verify
function autoVerifyAfterPurchase(name, typeId){
  const nameEl = document.getElementById("sch-name-input");
  if(nameEl) nameEl.value = name;
  verifiedName = name;
  verifiedTypeId = typeId;
  document.getElementById("sch-verify-bar").style.display="none";
  document.getElementById("sch-verified-content").style.display="block";
  document.getElementById("sch-verify-msg").style.display="none";
  const cfg2=loadCfg();
  const type=cfg2.classTypes?.find(t=>t.id===typeId);
  const typeBadgeWrap=document.getElementById("sch-type-badge");
  typeBadgeWrap.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:4px 0 8px">'
    +'<div style="background:var(--sage-light);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:500;color:var(--sage-deep)">'+(type?type.icon+" "+type.name:"")+'</div>'
    +'<div style="font-size:12px;color:var(--ink-mid)">的可預約時段</div>'
    +'<button onclick="resetVerify()" style="margin-left:auto;background:transparent;border:none;font-size:12px;color:var(--ink-light);cursor:pointer;font-family:inherit">← 重新輸入</button>'
    +'</div>';
  renderSlotList();
}

function getRemainingTickets(){
  if(!verifiedName) return -1;
  try{
    const now=new Date(Date.now()+8*3600000).toISOString().split('T')[0];
    const tickets=JSON.parse(localStorage.getItem('pilates_tickets')||'[]');
    const students=JSON.parse(localStorage.getItem('pilates_students')||'[]');
    const norm=s=>(s||'').trim().toLowerCase();
    const bkCfg=JSON.parse(localStorage.getItem('pilates_booking_cfg')||'{}');
    const verifiedTypeName=verifiedTypeId!=null
      ? (bkCfg.classTypes?.find(t=>String(t.id)===String(verifiedTypeId))?.name||null)
      : null;
    // Find student by name to get their ID (most reliable key)
    const stuRecord=students.find(s=>norm(s.name)===norm(verifiedName));
    const isActive=t=>t.left>0&&(!t.expireDate||t.expireDate>=now);
    const typeMatch=t=>!verifiedTypeName||norm(t.typeName)===norm(verifiedTypeName);
    // Try by studentId first
    let matched=stuRecord
      ? tickets.filter(t=>t.studentId===stuRecord.id&&typeMatch(t)&&isActive(t))
      : [];
    if(!matched.length) matched=tickets.filter(t=>norm(t.studentName)===norm(verifiedName)&&typeMatch(t)&&isActive(t));
    if(matched.length) return matched.reduce((s,t)=>s+t.left,0);
    // Fallback: any active ticket regardless of type
    let any=stuRecord ? tickets.filter(t=>t.studentId===stuRecord.id&&isActive(t)) : [];
    if(!any.length) any=tickets.filter(t=>norm(t.studentName)===norm(verifiedName)&&isActive(t));
    return any.reduce((s,t)=>s+t.left,0);
  }catch(e){return -1;}
}

let schWeekOffset = 0;  // 0 = this week (days 0-6), 1 = next week, etc.
let selectedSlots = new Set();
let remaining = 0; // module-level so updateBatchBar can access it  // batch selection

function getWeekRange(offset){
  const today = new Date(Date.now()+8*3600000);
  today.setHours(0,0,0,0);
  const start = new Date(today);
  start.setDate(start.getDate() + offset*7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => {
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+dd;
  };
  return {startDate: fmt(start), endDate: fmt(end)};
}

  const wrap = document.getElementById('schSlots');

  if(remaining === 0){
    wrap.innerHTML = '<div class="sch-empty"><div class="sch-empty-icon">🎟</div><p style="font-size:14px;font-weight:500;color:var(--ink)">目前沒有可預約的堂數</p><p style="font-size:12px;color:var(--ink-mid);margin-top:6px">請聯絡老師確認繳費或補課事宜</p></div>';
    document.getElementById('schBookBar').classList.remove('show');
    return;
  }
  const rb = document.getElementById('sch-remain-badge');
  if(rb) rb.textContent = (remaining>0&&remaining<99) ? '剩餘 '+remaining+' 堂可預約' : '';

  const {startDate, endDate} = getWeekRange(schWeekOffset);
  const allSlots = loadSlots();
  let slots = allSlots.filter(s => s.date >= startDate && s.date <= endDate);
  if(verifiedTypeId != null) slots = slots.filter(s => String(s.typeId) === String(verifiedTypeId));
  slots.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

  const cfg2 = loadCfg();

  // Week nav header
  const d0 = new Date(startDate+'T00:00:00'), d1 = new Date(endDate+'T00:00:00');
  const weekLabel = (d0.getMonth()+1)+'/'+d0.getDate()+' – '+(d1.getMonth()+1)+'/'+d1.getDate();
  let html = '<div style="display:flex;align-items:center;gap:6px;padding:10px 0 8px">'
    + '<button type="button" onclick="schWeekOffset=Math.max(0,schWeekOffset-1);selectedSlots.clear();renderSlotList()" '
    + 'style="background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-mid);flex-shrink:0'+(schWeekOffset===0?';opacity:.3;pointer-events:none':'')+'">'
    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>'
    + '<div style="flex:1;text-align:center">'
    + '<div style="font-size:13px;font-weight:500;color:var(--ink-mid)">'+weekLabel+'</div>'
    + (schWeekOffset>0?'<button type="button" onclick="schWeekOffset=0;selectedSlots.clear();renderSlotList()" style="font-size:11px;background:var(--sage-light);color:var(--sage-deep);border:none;border-radius:99px;padding:2px 10px;cursor:pointer;font-family:inherit;margin-top:3px">↩ 回到本週</button>':'')
    + '</div>'
    + '<button type="button" onclick="schWeekOffset++;selectedSlots.clear();renderSlotList()" '
    + 'style="background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-mid);flex-shrink:0">'
    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>'
    + '</div>';

  if(!slots.length){
    html += '<div class="sch-empty" style="padding:24px 0"><div class="sch-empty-icon">🗓</div><p>這週沒有開放時段<br>請往前或往後查看</p></div>';
    wrap.innerHTML = html;
    updateBatchBar();
    return;
  }

  // Group by date
  const byDate = {};
  slots.forEach(s => { if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); });
  Object.entries(byDate).forEach(function([date, daySlots]){
    const d = new Date(date+'T00:00:00');
    html += '<div class="sch-date-label">'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）</div>';
    daySlots.forEach(function(s){
      const type = cfg2.classTypes?.find(t => String(t.id) === String(s.typeId));
      const bk = s.bookings||[], cap = s.capacity||1, full = bk.length>=cap;
      const sel = selectedSlots.has(s.id);
      const tname = type ? (type.icon||'')+' '+type.name : '課程';
      html += '<div class="pub-slot-card'+(sel?' sel':'')+(full?' full':'')+'"'
        +(full?'':' onclick="toggleSlot(\''+s.id+'\')"')+'>'
        +'<div class="pub-slot-time">'+s.time+'</div>'
        +'<div class="pub-slot-info"><div class="pub-slot-name">'+tname+'</div>'
        +'<div class="pub-slot-meta">'+(s.duration||60)+'分鐘'+(s.location?' · '+s.location:'')+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:6px">'
        +(sel ? '<div style="width:22px;height:22px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>' : '')
        +'<div class="pub-slot-spots'+(full?' full':'')+'">'+( full?'已額滿':(cap-bk.length)+' 位空缺')+'</div>'
        +'</div></div>';
    });
  });

  // Loop booking hint (shows when no slot selected)
  if(remaining > 1 && selectedSlots.size === 0){
    html += '<div style="margin-top:10px;padding:10px 12px;background:var(--sand);border-radius:var(--radius-sm);font-size:12px;color:var(--ink-mid)">💡 選擇一個時段後，可選擇單次或循環預約</div>';
  }

  wrap.innerHTML = html;
  updateBatchBar();
}

function toggleSlot(slotId){
  if(selectedSlots.has(slotId)) selectedSlots.delete(slotId);
  else selectedSlots.add(slotId);
  renderSlotList();
}

function updateBatchBar(){
  const bar = document.getElementById('schBookBar');
  if(!bar) return;
  if(selectedSlots.size > 0){
    bar.classList.add('show');
    // Primary: confirm booking button
    let barHtml = '<button class="sch-book-btn" onclick="openSlotConfirm()">確認預約 '+selectedSlots.size+' 個時段 →</button>';
    // Secondary: loop booking (only show when exactly 1 slot selected and remaining > 1)
    if(selectedSlots.size === 1 && remaining > 1){
      barHtml += '<button onclick="loopBooking()" style="width:100%;background:transparent;color:var(--sage-deep);border:1.5px solid var(--sage);border-radius:99px;padding:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:6px">🔄 以所選時段循環預約（剩 '+remaining+' 堂）</button>';
    }
    bar.innerHTML = barHtml;
  } else {
    bar.classList.remove('show');
    bar.innerHTML = '<button class="sch-book-btn" onclick="openSlotConfirm()">預約這個時段 →</button>';
  }
}

function loopBooking(){
  const slots = loadSlots();
  if(selectedSlots.size !== 1){ alert('請先選擇一個時段作為起始時段'); return; }
  const baseSlotId = [...selectedSlots][0];
  const base = slots.find(s => s.id === baseSlotId);
  if(!base){ alert('找不到所選時段'); return; }
  const remaining = getRemainingTickets();
  if(remaining <= 0){ alert('已無剩餘堂數'); return; }

  // Find all future slots on same weekday + same time
  const baseDay = new Date(base.date+'T00:00:00').getDay();
  const today = new Date(); today.setHours(0,0,0,0);
  const future = slots
    .filter(s => s.date >= base.date &&
      new Date(s.date+'T00:00:00').getDay() === baseDay &&
      s.time === base.time &&
      (verifiedTypeId==null || String(s.typeId)===String(verifiedTypeId)) &&
      (s.bookings||[]).length < (s.capacity||1))
    .sort((a,b) => a.date.localeCompare(b.date))
    .slice(0, remaining);

  if(!future.length){ alert('找不到可循環的相同時段'); return; }

  const count = future.length;
  const confirmed = confirm(`將在每週${['日','一','二','三','四','五','六'][baseDay]} ${base.time}，為你預約接下來 ${count} 堂，確定嗎？`);
  if(!confirmed) return;

  // Book all
  let booked = 0;
  for(const slot of future){
    const idx = slots.findIndex(s => s.id === slot.id);
    if(idx < 0) continue;
    if((slots[idx].bookings||[]).length >= (slots[idx].capacity||1)) continue;
    slots[idx].bookings = slots[idx].bookings||[];
    let phone='';
    try{const stus=JSON.parse(localStorage.getItem('pilates_students')||'[]');phone=stus.find(s=>s.name===verifiedName)?.phone||'';}catch(e){}
    const cfg2=loadCfg(), type=cfg2.classTypes?.find(t=>String(t.id)===String(slot.typeId));
    const tname=type?(type.icon||'')+' '+type.name:'課程';
    slots[idx].bookings.push({name:verifiedName,phone,typeId:slot.typeId,typeName:tname,ts:Date.now()});
    booked++;
  }
  saveSlots(slots);

  // Deduct all booked from tickets
  try{
    const tickets=JSON.parse(localStorage.getItem('pilates_tickets')||'[]');
    const now=new Date(Date.now()+8*3600000).toISOString().split('T')[0];
    const bkCfg=JSON.parse(localStorage.getItem('pilates_booking_cfg')||'{}');
    const verifiedTypeName=verifiedTypeId!=null?(bkCfg.classTypes?.find(t=>String(t.id)===String(verifiedTypeId))?.name||null):null;
    const norm=s=>(s||'').trim().toLowerCase();
    let left=booked;
    for(let ti=0;ti<tickets.length&&left>0;ti++){
      const t=tickets[ti];
      if(norm(t.studentName)!==norm(verifiedName)) continue;
      if(verifiedTypeName&&norm(t.typeName)!==norm(verifiedTypeName)) continue;
      if(t.left<=0||t.expireDate<now) continue;
      const deduct=Math.min(t.left,left);
      tickets[ti].left-=deduct; left-=deduct;
    }
    saveTickets(tickets);  // triggers Firebase sync
  }catch(e){}

  // Sync to pilates_classes
  try{
    const allClasses=JSON.parse(localStorage.getItem('pilates_classes')||'[]');
    const allStudents=JSON.parse(localStorage.getItem('pilates_students')||'[]');
    const cfg2=loadCfg();
    for(const slot of future.slice(0,booked)){
      const updatedSlot=slots.find(s=>s.id===slot.id);
      if(!updatedSlot) continue;
      const slotType=cfg2.classTypes?.find(t=>String(t.id)===String(updatedSlot.typeId));
      const clsName=(slotType?(slotType.icon||'')+' '+slotType.name:'課程');
      const existingIdx=allClasses.findIndex(c=>c.slotId===updatedSlot.id);
      const members=(updatedSlot.bookings||[]).map(b=>{
        const stu=allStudents.find(st=>st.name.trim()===b.name.trim());
        const prev=existingIdx>=0?allClasses[existingIdx].members?.find(m=>m.studentName===b.name):null;
        return {studentId:stu?stu.id:'ext-'+b.name.replace(/\s/g,'-'),studentName:b.name,color:stu?stu.color||'c0':'c0',status:prev?prev.status:'pending'};
      });
      if(existingIdx>=0){allClasses[existingIdx].members=members;allClasses[existingIdx].name=clsName;}
      else allClasses.push({id:'slot-'+updatedSlot.id,slotId:updatedSlot.id,date:updatedSlot.date,name:clsName,time:updatedSlot.time,location:updatedSlot.location||'',saved:true,members});
    }
    saveClasses(allClasses);  // triggers Firebase sync
  }catch(e){}

  // Update student scheduledBookings
  try{
    const students=JSON.parse(localStorage.getItem('pilates_students')||'[]');
    const si=students.findIndex(st=>st.name.trim()===verifiedName);
    if(si>=0){
      students[si].scheduledBookings=students[si].scheduledBookings||[];
      for(const slot of future.slice(0,booked)){
        students[si].scheduledBookings.push({slotId:slot.id,date:slot.date,time:slot.time,typeId:slot.typeId,typeName:slot.typeName||'',ts:Date.now()});
      }
      saveStudents(students);  // Firebase sync
    }
  }catch(e){}

  selectedSlots.clear();
  alert('✓ 已成功循環預約 '+booked+' 堂！');
  renderSlotList();
}

function openSlotConfirm(){
  if(selectedSlots.size === 0){ alert('請先選擇時段'); return; }
  // Check allowBooking flag
  if(window._fb){
    window._fb.getFlags().then(function(flags){
      if(!flags.allowBooking){ alert('目前暫停開放線上預約，請聯絡老師。'); return; }
      _doOpenSlotConfirm();
    });
  } else { _doOpenSlotConfirm(); }
}
function _doOpenSlotConfirm(){
  if(selectedSlots.size === 0){ alert('請先選擇時段'); return; }
  if(selectedSlots.size === 1){
    // Single slot — show confirmation sheet
    const slotId = [...selectedSlots][0];
    const s = loadSlots().find(s=>s.id===slotId);
    if(!s) return;
    const d = new Date(s.date+'T00:00:00');
    const cfg2 = loadCfg();
    const type = cfg2.classTypes?.find(t=>String(t.id)===String(s.typeId));
    document.getElementById('slotPreviewTime').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'） '+s.time;
    document.getElementById('slotPreviewMeta').textContent=(type?(type.icon||'')+' '+type.name:'課程')+' · '+(s.duration||60)+'分鐘'+(s.location?' · '+s.location:'');
    document.getElementById('confirm-name').textContent=verifiedName||'';
    let phone='';
    try{const stus=JSON.parse(localStorage.getItem('pilates_students')||'[]');phone=stus.find(s=>s.name===verifiedName)?.phone||'';}catch(e){}
    document.getElementById('confirm-phone').textContent=phone?'電話：'+phone:'';
    document.getElementById('slotOverlay').classList.add('open');
    document.getElementById('slotSheet').classList.add('open');
  } else {
    // Batch — confirm all selected
    const remaining = getRemainingTickets();
    if(remaining<selectedSlots.size){
      alert('所選時段（'+selectedSlots.size+' 個）超過剩餘堂數（'+remaining+' 堂），請減少選擇');
      return;
    }
    const confirmed = confirm('確認預約 '+selectedSlots.size+' 個時段？');
    if(!confirmed) return;
    batchSubmitBooking();
  }
}

function batchSubmitBooking(){
  const remaining = getRemainingTickets();
  if(remaining < selectedSlots.size){ alert('堂數不足，無法預約所選全部時段'); return; }
  const slots = loadSlots();
  let booked = 0, failed = 0;
  let phone='';
  try{const stus=JSON.parse(localStorage.getItem('pilates_students')||'[]');phone=stus.find(s=>s.name===verifiedName)?.phone||'';}catch(e){}
  const cfg2=loadCfg();
  const bookedSlots = [];
  for(const slotId of selectedSlots){
    const idx=slots.findIndex(s=>s.id===slotId);
    if(idx<0){failed++;continue;}
    if((slots[idx].bookings||[]).length>=(slots[idx].capacity||1)){failed++;continue;}
    const type=cfg2.classTypes?.find(t=>String(t.id)===String(slots[idx].typeId));
    slots[idx].bookings=slots[idx].bookings||[];
    slots[idx].bookings.push({name:verifiedName,phone,typeId:slots[idx].typeId,typeName:type?(type.icon||'')+' '+type.name:'課程',ts:Date.now()});
    bookedSlots.push(slots[idx]);
    booked++;
  }
  saveSlots(slots);

  // Deduct tickets
  try{
    const tickets=JSON.parse(localStorage.getItem('pilates_tickets')||'[]');
    const now=new Date(Date.now()+8*3600000).toISOString().split('T')[0];
    const bkCfg=JSON.parse(localStorage.getItem('pilates_booking_cfg')||'{}');
    const verifiedTypeName=verifiedTypeId!=null?(bkCfg.classTypes?.find(t=>String(t.id)===String(verifiedTypeId))?.name||null):null;
    const norm=s=>(s||'').trim().toLowerCase();
    let left=booked;
    for(let ti=0;ti<tickets.length&&left>0;ti++){
      const t=tickets[ti];
      if(norm(t.studentName)!==norm(verifiedName)) continue;
      if(verifiedTypeName&&norm(t.typeName)!==norm(verifiedTypeName)) continue;
      if(t.left<=0||t.expireDate<now) continue;
      const deduct=Math.min(t.left,left);
      tickets[ti].left-=deduct; left-=deduct;
    }
    saveTickets(tickets);  // triggers Firebase sync
    const newRem=tickets.filter(t=>(t.studentName||'').trim().toLowerCase()===verifiedName.toLowerCase()&&t.left>0&&(!t.expireDate||t.expireDate>=now)).reduce((s,t)=>s+t.left,0);
    const rb=document.getElementById('sch-remain-badge');
    if(rb) rb.textContent=newRem>0?'剩餘 '+newRem+' 堂可預約':'已無剩餘堂數';
  }catch(e){}

  // Sync attendance & student record
  try{
    const allClasses=JSON.parse(localStorage.getItem('pilates_classes')||'[]');
    const allStudents=JSON.parse(localStorage.getItem('pilates_students')||'[]');
    for(const slot of bookedSlots){
      const slotType=cfg2.classTypes?.find(t=>String(t.id)===String(slot.typeId));
      const clsName=(slotType?(slotType.icon||'')+' '+slotType.name:'課程');
      const existingIdx=allClasses.findIndex(c=>c.slotId===slot.id);
      const members=(slot.bookings||[]).map(b=>{const stu=allStudents.find(st=>st.name.trim()===b.name.trim());const prev=existingIdx>=0?allClasses[existingIdx].members?.find(m=>m.studentName===b.name):null;return{studentId:stu?stu.id:'ext-'+b.name.replace(/\s/g,'-'),studentName:b.name,color:stu?stu.color||'c0':'c0',status:prev?prev.status:'pending'};});
      if(existingIdx>=0){allClasses[existingIdx].members=members;allClasses[existingIdx].name=clsName;}
      else allClasses.push({id:'slot-'+slot.id,slotId:slot.id,date:slot.date,name:clsName,time:slot.time,location:slot.location||'',saved:true,members});
    }
    saveClasses(allClasses);  // triggers Firebase sync
    const si=allStudents.findIndex(st=>st.name.trim()===verifiedName);
    if(si>=0){
      allStudents[si].scheduledBookings=allStudents[si].scheduledBookings||[];
      for(const slot of bookedSlots) allStudents[si].scheduledBookings.push({slotId:slot.id,date:slot.date,time:slot.time,typeId:slot.typeId,typeName:slot.typeName||'',ts:Date.now()});
      saveStudents(allStudents);  // triggers Firebase sync
    }
  }catch(e){}

  selectedSlots.clear();
  const wrap=document.getElementById('schSlots');
  wrap.innerHTML='<div class="sch-empty"><div class="sch-empty-icon">✅</div>'
    +'<p style="font-size:15px;font-weight:500;color:var(--ink);margin-bottom:8px">預約成功！</p>'
    +'<p style="font-size:13px;color:var(--ink-mid)">已預約 '+booked+' 個時段'+(failed>0?'，'+failed+' 個時段無法預約':'')+'</p>'
    +'<p style="font-size:12px;color:var(--ink-light);margin-top:12px">老師將與你確認，期待一起練習 🌿</p>'
    +'<button onclick="schWeekOffset=0;renderSlotList()" style="margin-top:16px;background:var(--sage-light);color:var(--sage-deep);border:none;border-radius:99px;padding:10px 20px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer">繼續查看其他時段</button>'
    +'</div>';
  document.getElementById('schBookBar').classList.remove('show');
}

function closeSlotForm(){
  document.getElementById('slotOverlay').classList.remove('open');
  document.getElementById('slotSheet').classList.remove('open');
}

function submitSlotBooking(){
  // Single slot confirmation from sheet
  if(selectedSlots.size === 0){ closeSlotForm(); return; }
  remaining = getRemainingTickets(); // update module-level var
  if(remaining === 0){ closeSlotForm(); alert('您的堂數已用完'); renderSlotList(); return; }

  closeSlotForm();
}

const DB_KEYS_SYNC = ['slots','booking_cfg'];  // student page only needs these two
const _fbUnsubscribers = {};
let _syncInitDone = false;
const _ownWrites = {};

async function fbGet(key) {
  if (window._fb) return await window._fb.get(key);
  try { return JSON.parse(localStorage.getItem('pilates_'+key)||(key==='booking_cfg'?'{}':'[]')); }
  catch { return key==='booking_cfg'?{}:[]; }
}

async function fbSet(key, value) {
  const serialized = JSON.stringify(value);
  localStorage.setItem('pilates_'+key, serialized);
  _ownWrites[key] = serialized;
  if (window._fb) await window._fb.set(key, value);
}

function fbSubscribeAll() {
  if (!window._fb) return;
  // Only subscribe to keys the student page needs
  ['slots','booking_cfg'].forEach(function(key) {
    if (_fbUnsubscribers[key]) return;
    _fbUnsubscribers[key] = window._fb.subscribe(key, function(k, value) {
      const incoming = JSON.stringify(value);
      if (_ownWrites[k] === incoming) { delete _ownWrites[k]; return; }
      const cur = localStorage.getItem('pilates_'+k);
      if (incoming === cur) return;
      localStorage.setItem('pilates_'+k, incoming);
      try {
        if (k==='slots' && typeof renderSlotList==='function') renderSlotList();
        if (k==='booking_cfg') { _cacheInvalidate('booking_cfg'); if(typeof fetchAndRender==='function') fetchAndRender(); }
      } catch(e) {}
    });
  });
}

function _cacheInvalidate(key){ /* index.html uses localStorage directly, no cache layer */ }

function saveStudents(d){ fbSet('students',d); }
function saveTickets(d){  fbSet('tickets',d); }
function saveClasses(d){  fbSet('classes',d); }
function savePayments(d){ fbSet('payments',d); }
function saveSlots(d){    fbSet('slots',d); }
function bkSaveCfg(d){   fbSet('booking_cfg',d); }

async function fetchAndRender() {
  // Pre-fetch from Firebase (belt-and-suspenders, module already pre-fetched)
  if (window._fb) {
    try { await Promise.all(['slots','booking_cfg'].map(k => window._fb.get(k))); } catch(e) {}
  }
  cfg = loadCfg();
  try { if(typeof renderPurchase==='function') renderPurchase(); } catch(e) {}
  try { if(typeof renderSchedule==='function') renderSchedule(); } catch(e) {}
  try { if(typeof renderFormFields==='function') renderFormFields(); } catch(e) {}
}

async function initFirebaseSync() {
  if (_syncInitDone) return;
  _syncInitDone = true;

  if (window._fb) {
    // Check maintenance mode
    const flags = await window._fb.getFlags();
    if (flags.maintenanceMode) {
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Chiron GoRound TC,sans-serif;background:#f5f1eb;text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:16px">🌿</div><div style="font-size:20px;font-weight:500;color:#2a2620;margin-bottom:8px">系統維護中</div><div style="font-size:14px;color:#6b6258;line-height:1.7">我們正在進行系統更新<br>請稍後再回來，感謝你的耐心等候</div></div>';
      return;
    }
    window._fb.subscribeFlags(function(flags) {
      if (flags.maintenanceMode) location.reload();
      if (!flags.allowBooking) {
        const bar = document.getElementById('schBookBar');
        if (bar) bar.classList.remove('show');
      }
    });
  }
  // Fetch fresh data and render
  await fetchAndRender();
  // Then subscribe for real-time updates
  fbSubscribeAll();
}

window._onFirebaseReady = function(){
  if(typeof initFirebaseSync === 'function') initFirebaseSync();
};
if (window._fbReady) {
  initFirebaseSync();
} else {
  window.addEventListener('firebase-ready', initFirebaseSync, { once: true });
}
// Safety fallback: if Firebase takes >5s, force fetch from latest localStorage
// (will show Firebase data once it arrives via onSnapshot)
setTimeout(function(){
  if(!_syncInitDone && typeof fetchAndRender==='function') fetchAndRender();
}, 5000);

</script>
