<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>嬋柔管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sage:#7a9e87;--sage-light:#edf4f0;--sage-mid:#c4dccb;
  --sand:#f5f1eb;--sand-dark:#e8e2d8;
  --ink:#2c2c2a;--ink-mid:#6b6b67;--ink-light:#a8a8a3;
  --white:#fefefe;
  --warn:#c0704a;--warn-bg:#fdf0ea;
  --absent:#b0444a;--absent-bg:#fbeaea;
  --leave:#8a7fc2;--leave-bg:#f1effb;
  --makeup:#5a97b8;--makeup-bg:#eaf3f9;
  --unpaid:#b0444a;--unpaid-bg:#fbeaea;
  --paid:#7a9e87;--paid-bg:#edf4f0;
  --expired:#888;--expired-bg:#f2f2f2;
  --transfer:#8a7fc2;
  --radius:16px;--radius-sm:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans TC',sans-serif;background:var(--sand);color:var(--ink);max-width:430px;margin:0 auto;display:flex;flex-direction:column}

/* ── Page system ── */
.page{display:none;flex-direction:column;height:100%;overflow:hidden}
.page.active{display:flex}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}

/* ── Topbar ── */
.topbar{background:var(--white);padding:48px 20px 12px;border-bottom:1px solid var(--sand-dark);flex-shrink:0;z-index:50;overflow:visible}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.topbar h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.btn-add{background:var(--sage);color:var(--white);border:none;border-radius:99px;padding:8px 16px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;flex-shrink:0}
.btn-add:active{opacity:.75}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--sand-dark);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;position:relative;transition:opacity .15s;border:none;background:transparent;font-family:inherit}
.nav-item:active{opacity:.6}
.nav-icon{width:22px;height:22px;margin-bottom:3px;color:var(--ink-light);transition:color .15s}
.nav-label{font-size:9px;color:var(--ink-light);transition:color .15s;font-weight:500}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--sage)}
.nav-badge{position:absolute;top:7px;right:calc(50% - 16px);background:var(--unpaid);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;display:none}
.nav-badge.show{display:flex}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:var(--sand);border-radius:99px;padding:3px;margin-top:2px}
.tab{flex:1;text-align:center;padding:7px 0;font-size:13px;font-weight:500;border-radius:99px;cursor:pointer;color:var(--ink-mid);transition:background .15s,color .15s;border:none;background:transparent;font-family:inherit}
.tab.active{background:var(--white);color:var(--ink)}

/* ── Stats strip ── */
.stats-strip{display:flex;gap:8px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--sand-dark);flex-shrink:0}
.stat-pill{flex:1;background:var(--sand);border-radius:var(--radius-sm);padding:10px 6px;text-align:center}
.stat-num{font-size:20px;font-weight:700;line-height:1;color:var(--sage)}
.stat-num.warn{color:var(--warn)} .stat-num.red{color:var(--absent)} .stat-num.purple{color:var(--leave)} .stat-num.blue{color:var(--makeup)} .stat-num.green{color:var(--sage)}
.stat-label{font-size:11px;color:var(--ink-mid);margin-top:3px}

/* ── List ── */
.list-wrap{padding:12px 16px 16px}
.section-label{font-size:11px;font-weight:500;color:var(--ink-mid);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px 2px}

/* ── Avatar ── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--white);flex-shrink:0}
.av44{width:44px;height:44px;font-size:16px}
.av42{width:42px;height:42px;font-size:15px}
.av40{width:40px;height:40px;font-size:15px}
.av32{width:32px;height:32px;font-size:13px}
.av28{width:28px;height:28px;font-size:11px}
.av72{width:72px;height:72px;font-size:28px;margin:0 auto 10px}
.c0{background:#7a9e87}.c1{background:#a07860}.c2{background:#6e8eab}.c3{background:#9e7aaa}.c4{background:#a89960}

/* ── Cards ── */
.card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:transform .1s}
.card:active{transform:scale(.985)}
.card.warn-border{border-color:#f0c9b5}
.card.absent-border{border-color:#f0b8ba}
.card.leave-border{border-color:#c8c3e8}
.card.makeup-border{border-color:#a8cfdf}
.card-row{display:flex;align-items:center;gap:12px}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:500;margin-bottom:2px}
.card-meta{font-size:12px;color:var(--ink-mid)}
.chevron{color:var(--ink-light);flex-shrink:0}

/* ── Badge ── */
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;flex-shrink:0;white-space:nowrap}
.badge.ok{background:var(--sage-light);color:var(--sage)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.none{background:var(--sand);color:var(--ink-mid)}
.badge.expired{background:var(--expired-bg);color:var(--expired)}
.badge.present{background:var(--sage-light);color:var(--sage)}
.badge.absent{background:var(--absent-bg);color:var(--absent)}
.badge.leave{background:var(--leave-bg);color:var(--leave)}
.badge.makeup{background:var(--makeup-bg);color:var(--makeup)}
.mini-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px}
.mb-present{background:var(--sage-light);color:var(--sage)}
.mb-absent{background:var(--absent-bg);color:var(--absent)}
.mb-leave{background:var(--leave-bg);color:var(--leave)}
.mb-makeup{background:var(--makeup-bg);color:var(--makeup)}

/* ── Progress ── */
.progress-wrap{margin-top:10px}
.progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.progress-label{font-size:12px;color:var(--ink-mid)}
.progress-count{font-size:13px;font-weight:500}
.progress-track{height:6px;border-radius:99px;background:var(--sand-dark);overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--sage);transition:width .4s}
.progress-fill.warn{background:var(--warn)}
.progress-fill.low{background:#e8a87a}

/* ── Roll call buttons ── */
.status-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;max-width:160px;justify-content:flex-end}
.stn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--sand-dark);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.stn:active{transform:scale(.85)}
.stn.ap{background:var(--sage-light);border-color:var(--sage)}
.stn.aa{background:var(--absent-bg);border-color:var(--absent)}
.stn.al{background:var(--leave-bg);border-color:var(--leave)}
.stn.am{background:var(--makeup-bg);border-color:var(--makeup)}
.stn.apd{background:#f5f0ff;border-color:#9b7fc4;color:#9b7fc4}
.roll-card.pending{border-color:#d4c5e8}
.hist-status.pending{color:#9b7fc4}

/* ── History ── */
.hist-card{background:var(--white);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;border:1px solid var(--sand-dark)}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.hist-date{font-size:15px;font-weight:500}
.hist-day{font-size:12px;color:var(--ink-mid);margin-top:1px}
.hist-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.hist-rows{border-top:1px solid var(--sand-dark)}
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--sand-dark)}
.hist-row:last-child{border-bottom:none}
.hist-rname{font-size:13px;flex:1}
.hist-status{font-size:12px;font-weight:500}
.hist-status.present{color:var(--sage)}.hist-status.absent{color:var(--absent)}.hist-status.leave{color:var(--leave)}.hist-status.makeup{color:var(--makeup)}

/* ── Student attendance view ── */
.stu-card{background:var(--white);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;border:1px solid var(--sand-dark)}
.stu-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.stu-info{flex:1}
.stu-dots{display:flex;gap:3px;flex-wrap:wrap;max-width:110px;justify-content:flex-end}
.dot{width:10px;height:10px;border-radius:50%}
.dot.present{background:var(--sage)}.dot.absent{background:var(--absent)}.dot.leave{background:var(--leave)}.dot.makeup{background:var(--makeup)}.dot.none{background:var(--sand-dark)}
.stu-expand{border-top:1px solid var(--sand-dark);padding:10px 16px;display:none}
.stu-expand.open{display:block}
.stu-log-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sand-dark);font-size:13px}
.stu-log-row:last-child{border-bottom:none}

/* ── Finance hero ── */
.hero-card{margin:12px 16px 0;background:var(--sage);border-radius:var(--radius);padding:20px;color:var(--white);flex-shrink:0}
.hero-label{font-size:13px;opacity:.8;margin-bottom:4px}
.hero-amount{font-size:38px;font-weight:700;letter-spacing:-1px;line-height:1}
.hero-row{display:flex;gap:20px;margin-top:16px}
.hero-sub{flex:1}
.hero-sub-label{font-size:11px;opacity:.7;margin-bottom:2px}
.hero-sub-val{font-size:18px;font-weight:600}

/* ── Finance charts ── */
.chart-wrap{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chart-title{font-size:14px;font-weight:500;margin-bottom:14px}
.bar-rows{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--ink-mid);width:30px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:20px;background:var(--sand);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--sage);transition:width .5s}
.bar-val{font-size:12px;font-weight:500;width:52px;text-align:right;flex-shrink:0}
.method-rows{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.method-row{display:flex;align-items:center;gap:10px}
.method-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.method-name{font-size:13px;flex:1}
.method-bar-track{flex:2;height:8px;background:var(--sand);border-radius:99px;overflow:hidden}
.method-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.method-val{font-size:12px;color:var(--ink-mid);width:52px;text-align:right}

/* ── Unpaid card ── */
.unpaid-card{background:var(--unpaid-bg);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;border:1px solid #f0b8ba;cursor:pointer}
.unpaid-top{display:flex;align-items:center;gap:12px}
.unpaid-info{flex:1}
.unpaid-name{font-size:15px;font-weight:500}
.unpaid-desc{font-size:12px;color:var(--ink-mid);margin-top:2px}
.unpaid-amount{font-size:18px;font-weight:700;color:var(--unpaid)}
.unpaid-days{font-size:11px;color:var(--unpaid);margin-top:2px;text-align:right}
.btn-mark-paid{margin-top:10px;width:100%;background:var(--white);color:var(--unpaid);border:1.5px solid var(--unpaid);border-radius:99px;padding:9px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}

/* ── Pay card ── */
.pay-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid transparent;transition:transform .1s}
.pay-card:active{transform:scale(.985)}
.pay-card.unpaid{border-color:#f0b8ba}
.pay-info{flex:1;min-width:0}
.pay-name{font-size:15px;font-weight:500}
.pay-meta{font-size:12px;color:var(--ink-mid);margin-top:2px}
.pay-right{text-align:right;flex-shrink:0}
.pay-amount{font-size:16px;font-weight:600}
.pay-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;margin-top:3px;display:inline-block}
.pb-paid{background:var(--paid-bg);color:var(--paid)}
.pb-unpaid{background:var(--unpaid-bg);color:var(--unpaid)}

/* ── Ticket card ── */
.tc-top{display:flex;align-items:center;gap:12px}
.tc-info{flex:1;min-width:0}
.tc-name{font-size:15px;font-weight:500}
.tc-type{font-size:12px;color:var(--ink-mid);margin-top:1px}
.tc-meta{display:flex;gap:12px;margin-top:8px}
.tc-meta-item{font-size:11px;color:var(--ink-light)}
.tc-meta-item span{color:var(--ink-mid)}

/* ── Date nav ── */
.date-nav{display:flex;align-items:center;gap:8px;width:100%}
.date-nav button{background:var(--sand);border:none;border-radius:50%;width:36px;height:36px;min-width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-mid);transition:opacity .15s;flex-shrink:0;flex-grow:0}
.date-nav button:active{opacity:.6}
.date-display{flex:1;text-align:center;font-size:15px;font-weight:500;cursor:pointer;padding:6px 0;min-width:0;overflow:hidden}
.date-display small{display:block;font-size:11px;color:var(--ink-mid);font-weight:400;margin-top:1px}


/* ── Month nav ── */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.month-nav button{background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-mid);transition:opacity .15s;flex-shrink:0}
.month-nav button:active{opacity:.6}
.month-label{flex:1;text-align:center;font-size:16px;font-weight:600}

/* ── Save bar ── */
.save-bar{background:var(--white);border-top:1px solid var(--sand-dark);padding:12px 20px;display:none;flex-shrink:0}
.save-bar.show{display:block}
.btn-save-bar{width:100%;background:var(--sage);color:var(--white);border:none;border-radius:99px;padding:14px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer}

/* ── Search ── */
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-light);width:16px;height:16px}
.search-input{width:100%;background:var(--sand);border:1px solid var(--sand-dark);border-radius:99px;padding:9px 14px 9px 36px;font-size:14px;font-family:inherit;color:var(--ink);outline:none}
.search-input:focus{border-color:var(--sage)}
.search-input::placeholder{color:var(--ink-light)}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--ink-mid)}
.empty svg{width:48px;height:48px;margin-bottom:12px;color:var(--sage-mid)}
.empty p{font-size:14px;line-height:1.7}

/* ── Backdrop & Sheet ── */
.backdrop{position:fixed;inset:0;background:rgba(44,44,42,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.backdrop.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--white);border-radius:24px 24px 0 0;z-index:400;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--sand-dark);border-radius:99px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.sheet-title{font-size:18px;font-weight:700}
.btn-close{background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-mid)}
.btn-close:active{opacity:.6}
.sheet-body{padding:0 20px 32px}

/* ── Form ── */
.form-section{background:var(--sand);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden}
.form-section-label{font-size:11px;font-weight:500;color:var(--ink-mid);padding:12px 14px 4px;text-transform:uppercase;letter-spacing:.06em}
.form-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--sand-dark);gap:12px}
.form-row:last-child{border-bottom:none}
.form-row label{font-size:14px;color:var(--ink);flex-shrink:0;width:80px}
.form-row input,.form-row select,.form-row textarea{flex:1;background:transparent;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--ink);text-align:right}
.form-row textarea{text-align:left;resize:none;min-height:60px;padding-top:2px}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--ink-light)}
.btn-save{width:100%;background:var(--sage);color:var(--white);border:none;border-radius:99px;padding:15px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-save:active{opacity:.75}

/* ── Detail sheet content ── */
.detail-avatar{margin:0 auto 10px}
.detail-name{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px}
.detail-meta-text{text-align:center;font-size:13px;color:var(--ink-mid);margin-bottom:20px}
.info-row{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--sand-dark);gap:10px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:13px;color:var(--ink-mid);width:90px;flex-shrink:0;padding-top:1px}
.info-val{font-size:13px;color:var(--ink);flex:1;line-height:1.5}
.detail-tickets{background:var(--sage-light);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.detail-tickets.warn{background:var(--warn-bg)}
.tickets-num{font-size:32px;font-weight:700;color:var(--sage);line-height:1}
.detail-tickets.warn .tickets-num{color:var(--warn)}
.tickets-label{font-size:12px;color:var(--ink-mid);margin-bottom:2px}
.tickets-total{font-size:12px;color:var(--ink-mid)}
.btn-deduct{background:var(--sage);color:var(--white);border:none;border-radius:99px;padding:10px 18px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s}
.detail-tickets.warn .btn-deduct{background:var(--warn)}
.detail-hero-ticket{background:var(--sage-light);border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center}
.detail-hero-ticket.warn{background:var(--warn-bg)}
.detail-hero-ticket.expired{background:var(--expired-bg)}
.dht-name{font-size:18px;font-weight:700;margin-bottom:2px}
.dht-type{font-size:13px;color:var(--ink-mid);margin-bottom:16px}
.dht-count{font-size:56px;font-weight:700;color:var(--sage);line-height:1}
.detail-hero-ticket.warn .dht-count{color:var(--warn)}
.detail-hero-ticket.expired .dht-count{color:var(--expired)}
.dht-sub{font-size:13px;color:var(--ink-mid);margin-top:4px}
.big-btn{width:100%;border:none;border-radius:99px;padding:15px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-bottom:10px;transition:opacity .15s}
.big-btn.green{background:var(--sage);color:var(--white)}
.big-btn.warn{background:var(--warn);color:var(--white)}
.big-btn.sage-outline{background:transparent;border:1.5px solid var(--sage);color:var(--sage)}
.big-btn.unpaid-outline{background:transparent;border:1.5px solid var(--unpaid);color:var(--unpaid)}
.big-btn:active{opacity:.75}
.big-btn:disabled{opacity:.4;cursor:default}
.btn-danger{width:100%;background:transparent;color:var(--warn);border:none;border-radius:99px;padding:13px;font-size:14px;font-family:inherit;cursor:pointer;margin-top:2px}
.log-list{margin-top:4px}
.log-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--sand-dark);font-size:13px}
.log-item:last-child{border-bottom:none}
.log-date{color:var(--ink-mid)}
.log-action.deduct{color:var(--warn);font-weight:500}

/* Sheet helpers */
const allSheets = ['sheet-stuAdd','sheet-stuDetail','sheet-stuEdit','sheet-tktAdd','sheet-tktDetail','sheet-classAdd','sheet-payAdd','sheet-payDetail','sheet-slotAdd'];
function openSheet(id){ document.getElementById('backdrop').classList.add('open'); document.getElementById(id).classList.add('open'); }

/* Toast */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }

/* Nav badges */
function updateBadges(){
  const unpaidCount = loadPayments().filter(p=>p.status==='unpaid').length;
  const el2=document.getElementById('nav-badge-finance');
  if(el2){ el2.textContent=unpaidCount||''; el2.classList.toggle('show',unpaidCount>0); }

  const lowTkt = loadTickets().filter(t=>!isTicketExpired(t)&&t.left>0&&t.left<=3).length;
  const el1=document.getElementById('nav-badge-students');

/* ══════════════════════════════════

══════════════════════════════════ */
let currentPage = 'students';
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  currentPage = page;
  closeSheets();
  if(page==='students') renderStudents();
  else if(page==='attendance') renderAttendance();
  else if(page==='finance') renderFinance();

  else if(page==='schedule'){ schInitCalendar(); schRenderCalendar(); }

}


/* ══════════════════════════════════
   STUDENTS (integrated with tickets)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function renderStudents(){
  const q = document.getElementById('stu-search').value.trim().toLowerCase();
  let students = loadStudents();
  if(q) students = students.filter(s=>s.name.toLowerCase().includes(q)||(s.phone||'').includes(q));
  const allTkts = loadTickets();
  const total = loadStudents().length;
  const active = allTkts.filter(t=>!isTicketExpired(t)).length;
  const low = allTkts.filter(t=>!isTicketExpired(t)&&t.left>0&&t.left<=3).length;
  document.getElementById('stu-stats').innerHTML=
    '<div class="stat-pill"><div class="stat-num">'+total+'</div><div class="stat-label">學員總數</div></div>'+
    '<div class="stat-pill"><div class="stat-num">'+active+'</div><div class="stat-label">有效套票</div></div>'+
    '<div class="stat-pill"><div class="stat-num warn">'+low+'</div><div class="stat-label">需補票</div></div>';
  const wrap = document.getElementById('stu-list');
  if(!students.length){ wrap.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><p>'+(q?'找不到符合的學員':'還沒有學員，點右上角新增！')+'</p></div>'; return; }
  wrap.innerHTML = students.map(function(s){
    const myTickets = allTkts.filter(t=>t.studentId===s.id&&!isTicketExpired(t));
    const best = myTickets.sort((a,b)=>b.left-a.left)[0];
    const left = best ? best.left : 0;
    const warn = best && left <= 3;
    const badgeTxt = best ? ('剩 '+left+' 堂') : '無套票';
    const badgeCls = best ? (warn?'warn':'ok') : 'none';
    return '<div class="card '+(warn?'warn-border':'')+'" onclick="openStudentDetail('+s.id+')"><div class="card-row"><div class="avatar av44 '+s.color+'">'+s.name.slice(0,1)+'</div><div class="card-info"><div class="card-name">'+s.name+'</div><div class="card-meta">'+(s.phone||'')+(s.line?' · '+s.line:'')+'</div></div><span class="badge '+badgeCls+'">'+badgeTxt+'</span><svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
  }).join('');
}

function openStudentAdd(){

function saveStudent(){

  students.push({id:Date.now(),name:name,phone:document.getElementById('fs-phone').value.trim(),line:document.getElementById('fs-line').value.trim(),joined:document.getElementById('fs-joined').value,ecName:document.getElementById('fs-ecname').value.trim(),ecRel:document.getElementById('fs-ecrel').value.trim(),ecPhone:document.getElementById('fs-ecphone').value.trim(),notes:document.getElementById('fs-notes').value.trim(),color:COLORS[students.length%COLORS.length]});

  closeSheets(); renderStudents(); updateBadges();

}
function openStudentEdit(id){
  const s = loadStudents().find(function(s){return s.id===id;});

  document.getElementById('fe-id').value = id;
  document.getElementById('fe-name').value = s.name||'';
  document.getElementById('fe-phone').value = s.phone||'';
  document.getElementById('fe-line').value = s.line||'';
  document.getElementById('fe-ecname').value = s.ecName||'';
  document.getElementById('fe-ecrel').value = s.ecRel||'';
  document.getElementById('fe-ecphone').value = s.ecPhone||'';
  document.getElementById('fe-notes').value = s.notes||'';

}
function saveStudentEdit(){
  const id = parseInt(document.getElementById('fe-id').value);
  const name = document.getElementById('fe-name').value.trim();
  if(!name){toast('請填寫姓名');return;}
  const students = loadStudents();
  const idx = students.findIndex(function(s){return s.id===id;});
  if(idx<0) return;
  students[idx] = Object.assign({},students[idx],{name:name,phone:document.getElementById('fe-phone').value.trim(),line:document.getElementById('fe-line').value.trim(),ecName:document.getElementById('fe-ecname').value.trim(),ecRel:document.getElementById('fe-ecrel').value.trim(),ecPhone:document.getElementById('fe-ecphone').value.trim(),notes:document.getElementById('fe-notes').value.trim()});
  saveStudents(students);
  closeSheets(); renderStudents();
  toast('已更新 '+name+' 的資料');
}
function openStudentDetail(id){
  const students = loadStudents();
  const s = students.find(function(s){return s.id===id;});
  if(!s) return;
  const allTkts = loadTickets();
  const allMyTkts = allTkts.filter(function(t){return t.studentId===id;});
  const STATUS_LBL = {present:'到課',absent:'缺席',leave:'請假',makeup:'補課'};
  const tktRows = allMyTkts.sort((a,b)=>b.boughtDate.localeCompare(a.boughtDate)).map(function(t){
    const exp=isTicketExpired(t),low=isTicketLow(t);
    const cls=exp?'expired':(low?'warn':'ok');
    const statusTxt=exp?(t.left<=0?'已用完':'已過期'):('剩 '+t.left+' 堂');
    const pct=t.total>0?Math.round((t.total-t.left)/t.total*100):0;
    return '<div class="card" style="margin-bottom:6px;cursor:default;'+(exp?'opacity:.6':'')+'"><div class="card-row"><div style="flex:1"><div class="card-name" style="font-size:14px">'+(t.typeName||t.planName||t.total+'堂套票')+'</div><div class="card-meta">購買：'+t.boughtDate+' · NT$ '+(t.price||0).toLocaleString()+'</div>'+(t.total>1?'<div style="margin-top:6px"><div class="progress-track"><div class="progress-fill '+(low?'warn':'')+'" style="width:'+pct+'%"></div></div></div>':'')+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span class="badge '+cls+'">'+statusTxt+'</span>'+(!exp?'<button onclick="event.stopPropagation();quickDeduct('+t.id+')" style="font-size:11px;background:var(--sage-light);color:var(--sage);border:none;border-radius:99px;padding:3px 10px;cursor:pointer">扣 1 堂</button>':'')+'</div></div></div>';
  }).join('') || '<div style="font-size:13px;color:var(--ink-mid);padding:8px 0">無套票紀錄</div>';
  const classes = loadClasses().filter(function(c){return c.saved&&c.members.some(function(m){return m.studentId===id;});});
  const attCounts={present:0,absent:0,leave:0,makeup:0};
  classes.forEach(function(c){const m=c.members.find(function(m){return m.studentId===id;});if(m)attCounts[m.status]=(attCounts[m.status]||0)+1;});
  const attTotal=classes.length;
  const attRate=attTotal?Math.round(attCounts.present/attTotal*100):0;
  const recentClasses=classes.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById('sheet-stuDetail-body').innerHTML=
    '<div class="avatar av72 '+s.color+'" style="display:flex">'+s.name.slice(0,1)+'</div>'+
    '<div class="detail-name">'+s.name+'</div>'+
    '<div class="detail-meta-text">加入日期：'+(s.joined||'未記錄')+'</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:16px">'+
      '<button onclick="closeSheets();openStudentEdit('+s.id+')" style="flex:1;background:var(--sage-light);color:var(--sage);border:none;border-radius:99px;padding:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer">✏️ 編輯資料</button>'+
      '<button onclick="closeSheets();openTicketAdd('+s.id+')" style="flex:1;background:var(--sage);color:#fff;border:none;border-radius:99px;padding:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer">＋ 新增套票</button>'+
    '</div>'+
    '<div style="font-size:13px;font-weight:500;color:var(--ink-mid);margin-bottom:8px">套票紀錄</div>'+tktRows+
    '<div style="font-size:13px;font-weight:500;color:var(--ink-mid);margin:16px 0 8px">上課統計</div>'+
    '<div style="background:var(--sand);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;gap:16px">'+
      '<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:700;color:var(--sage)">'+attTotal+'</div><div style="font-size:11px;color:var(--ink-mid)">總堂數</div></div>'+
      '<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:700;color:var(--sage)">'+attRate+'%</div><div style="font-size:11px;color:var(--ink-mid)">到課率</div></div>'+
      '<div style="text-align:center;flex:1"><div style="font-size:20px;font-weight:700;color:var(--absent)">'+attCounts.absent+'</div><div style="font-size:11px;color:var(--ink-mid)">缺席</div></div>'+
    '</div>'+
    (recentClasses.length?'<div style="font-size:12px;color:var(--ink-mid);margin-bottom:6px">最近上課</div>'+recentClasses.map(function(c){const m=c.members.find(function(m){return m.studentId===id;});return '<div class="info-row"><span class="info-label">'+c.date+'</span><span class="info-val">'+c.name+' <span class="hist-status '+(m?m.status:'')+'" style="font-size:12px;font-weight:500">'+(STATUS_LBL[m?m.status:''||'']||'')+'</span></span></div>';}).join(''):'')+
    // Scheduled bookings from booking-public
    (function(){
      const booked = (s.scheduledBookings||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,5);
      if(!booked.length) return '';
      const SCH_D=['日','一','二','三','四','五','六'];
      return '<div style="font-size:13px;font-weight:500;color:var(--ink-mid);margin:16px 0 8px">預約課程時段</div>'

function quickDeduct(ticketId){
  const tickets=loadTickets();
  const t=tickets.find(function(t){return t.id===ticketId;});
  if(!t||t.left<=0){toast('堂數已用完');return;}
  t.left--;
  t.log=t.log||[];
  t.log.push({date:todayStr(),action:'deduct'});
  saveTickets(tickets);
  openStudentDetail(t.studentId);
  updateBadges();
  toast('已扣 1 堂，'+t.studentName+' 剩 '+t.left+' 堂');
}
function stuDeduct(studentId){ quickDeduct(loadTickets().filter(function(t){return t.studentId===studentId&&!isTicketExpired(t)&&t.left>0;}).sort((a,b)=>b.left-a.left)[0]?.id); }
function deleteStudent(id){

  saveStudents(loadStudents().filter(function(s){return s.id!==id;}));

}

function saveTicket(){
  const students=loadStudents();
  const cfg=bkLoadCfg();
  const studentId=parseInt(document.getElementById('ft-student').value);
  const student=students.find(function(s){return s.id===studentId;});
  if(!student){toast('請選擇學員');return;}
  const typeId=document.getElementById('ft-ctype')?.value;
  const planId=document.getElementById('ft-plan')?.value;
  const type=cfg.classTypes?.find(function(t){return String(t.id)===String(typeId);});
  const plan=type?.plans?.find(function(p){return String(p.id)===String(planId);});
  const sessions=parseInt(document.getElementById('ft-sessions').value)||1;
  const price=parseInt(document.getElementById('ft-price').value)||0;
  const validDays=parseInt(document.getElementById('ft-validdays').value)||180;
  const boughtDate=document.getElementById('ft-bought').value;
  const method=document.getElementById('ft-method').value;
  const status=document.getElementById('ft-status').value;
  const expDate=new Date(boughtDate+'T00:00:00');
  expDate.setDate(expDate.getDate()+validDays);
  const expireDate=expDate.toISOString().split('T')[0];
  const tickets=loadTickets();
  const tktId=Date.now();
  tickets.push({id:tktId,studentId:studentId,studentName:student.name,color:student.color||'c0',typeName:type?.name||'',planName:plan?.name||'',type:sessions,total:sessions,left:sessions,price:price,boughtDate:boughtDate,expireDate:expireDate,log:[{date:boughtDate,action:'buy'}]});
  saveTickets(tickets);
  const payments=loadPayments();
  payments.push({id:tktId+1,studentId:studentId,studentName:student.name,color:student.color||'c0',item:(type?.name||'')+(plan?'・'+plan.name:''),amount:price,date:boughtDate,method:method,status:status,note:''});
  savePayments(payments);
  closeSheets(); renderStudents(); updateBadges();
  toast('已為 '+student.name+' 新增套票，收費紀錄已建立');
}

          </div>

      </div>`;
    }).join('');

  }).join('');

function setStatus(classId,studentId,status){
  const prevStatus = rollState[classId]?.[studentId];
  if(!rollState[classId]) rollState[classId]={};
  rollState[classId][studentId]=status;
  const classes=loadClasses();
  const cls=classes.find(c=>String(c.id)===String(classId));
  if(cls) cls.saved=false;
  saveClasses(classes);
  // If changing TO makeup from leave/absent → add 1 session back to student's ticket
  if(status==='makeup' && prevStatus && prevStatus!=='makeup'){
    const stu=cls?.members?.find(m=>m.studentId===studentId);
    if(stu){
      const tickets=loadTickets();
      const now=todayStr();
      const tIdx=tickets.findIndex(t=>
        t.studentId===studentId && (!t.expireDate||t.expireDate>=now)
      );
      if(tIdx>=0){
        tickets[tIdx].left+=1;
        tickets[tIdx].log=tickets[tIdx].log||[];
        tickets[tIdx].log.push({date:now,action:'makeup',note:'管理員標記補課'});
        saveTickets(tickets);
        toast('✓ 已補課，'+stu.studentName+' 堂數 +1');
      }
    }
  }
  renderRoll();
}
function saveRoll(){
  const classes=loadClasses();
  classes.forEach(cls=>{ if(cls.date===attDate){ cls.members.forEach(m=>{ if(rollState[cls.id]&&rollState[cls.id][m.studentId]!==undefined) m.status=rollState[cls.id][m.studentId]; }); cls.saved=true; } });
  saveClasses(classes);
  renderAttendance();
  document.getElementById('att-savebar').classList.remove('show');
  toast('✓ 點名紀錄已儲存');
}

  const totalUnpaid=mp.filter(p=>p.status==='unpaid').reduce((s,p)=>s+p.amount,0);

    document.getElementById('fin-hero').innerHTML=`<div class="hero-card" style="background:var(--unpaid)"><div class="hero-label">所有未收款</div><div class="hero-amount">NT$ ${all.reduce((s,p)=>s+p.amount,0).toLocaleString()}</div><div class="hero-row"><div class="hero-sub"><div class="hero-sub-label">筆數</div><div class="hero-sub-val">${all.length} 筆</div></div><div class="hero-sub"><div class="hero-sub-label">人數</div><div class="hero-sub-val">${new Set(all.map(p=>p.studentId)).size} 人</div></div></div></div>`;
    document.getElementById('fin-stats').innerHTML='';
    renderUnpaid(); return;

function renderReport(){

  const monthlyData=months.map(m=>({ ...m, total:payments.filter(p=>{ const d=new Date(p.date+'T00:00:00'); return d.getFullYear()===m.year&&d.getMonth()===m.month; }).reduce((s,p)=>s+p.amount,0) }));
  const maxVal=Math.max(...monthlyData.map(m=>m.total),1);
  const methods={};
  payments.forEach(p=>{ methods[p.method]=(methods[p.method]||0)+p.amount; });
  const totalRev=Object.values(methods).reduce((s,v)=>s+v,0);
  const methodRows=Object.entries(methods).sort((a,b)=>b[1]-a[1]).map(([name,val])=>`<div class="method-row"><div class="method-dot" style="background:${METHOD_COLORS[name]||'#a8a8a3'}"></div><span class="method-name">${name}</span><div class="method-bar-track"><div class="method-bar-fill" style="width:${Math.round(val/totalRev*100)}%;background:${METHOD_COLORS[name]||'#a8a8a3'}"></div></div><span class="method-val">$${(val/1000).toFixed(1)}k</span></div>`).join('');
  const mp=monthPayments().filter(p=>p.status==='paid');
  const items={};
  mp.forEach(p=>{ items[p.item]=(items[p.item]||0)+p.amount; });
  const itemRows=Object.entries(items).sort((a,b)=>b[1]-a[1]).map(([n,v])=>`<div class="info-row"><span class="info-label">${n}</span><span class="info-val" style="text-align:right;font-weight:500">NT$ ${v.toLocaleString()}</span></div>`).join('');
  const stuMap={};
  mp.forEach(p=>{ if(!stuMap[p.studentId]) stuMap[p.studentId]={name:p.studentName,color:p.color,total:0,count:0}; stuMap[p.studentId].total+=p.amount; stuMap[p.studentId].count++; });
  const stuRows=Object.values(stuMap).sort((a,b)=>b.total-a.total).map(s=>`<div class="pay-card" style="margin-bottom:6px"><div class="avatar av42 ${s.color}">${s.name.slice(0,1)}</div><div class="pay-info"><div class="pay-name">${s.name}</div><div class="pay-meta">${s.count} 筆收費</div></div><div class="pay-right"><div class="pay-amount">NT$ ${s.total.toLocaleString()}</div></div></div>`).join('');
  document.getElementById('fin-list').innerHTML=`
    <div class="chart-wrap"><div class="chart-title">近六個月收入</div><div class="bar-rows">${monthlyData.map(m=>`<div class="bar-row"><span class="bar-label">${m.label}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.total/maxVal*100)}%"></div></div><span class="bar-val">${m.total?'$'+(m.total/1000).toFixed(1)+'k':'—'}</span></div>`).join('')}</div></div>
    <div class="chart-wrap"><div class="chart-title">收款方式分布（累計）</div><div class="method-rows">${methodRows||'<div style="font-size:13px;color:var(--ink-mid)">還沒有資料</div>'}</div></div>
    <div class="section-label">${finMonth+1} 月收入項目</div>
    <div style="background:var(--white);border-radius:var(--radius);padding:4px 16px;margin-bottom:12px">${itemRows||'<div style="font-size:13px;color:var(--ink-mid);padding:12px 0">本月無收費</div>'}</div>
    <div class="section-label">${finMonth+1} 月學員貢獻</div>
    ${stuRows||'<div class="empty" style="padding:20px"><p>本月無收費</p></div>'}
  `;
}

    <button class="btn-danger" onclick="deletePayment(${p.id})">刪除此紀錄</button>

function createTicketFromPayment(p){
  // When a payment is marked paid, auto-create a ticket if item matches a plan
  if(!p||p.status!=='paid') return;
  const cfg=bkLoadCfg();
  // parse item: "課程類型名・方案名"
  const parts=(p.item||'').split('・');
  const typeName=parts[0]?.trim()||'';
  const planName=parts[1]?.trim()||'';
  const type=cfg.classTypes?.find(t=>t.name===typeName);
  const plan=type?.plans?.find(pl=>pl.name===planName);
  if(!type||!plan) return; // not a standard plan payment
  const tickets=loadTickets();
  // Avoid duplicate (same student+item+boughtDate)
  const dup=tickets.find(t=>t.studentId===p.studentId&&t.boughtDate===p.date&&t.planName===planName);
  if(dup) return;
  const validDays=plan.validDays||180;
  const expDate=new Date(p.date+'T00:00:00');
  expDate.setDate(expDate.getDate()+validDays);
  tickets.push({
    id:Date.now(),studentId:p.studentId,studentName:p.studentName,color:p.color||'c0',
    typeName:typeName,planName:planName,
    type:plan.sessions,total:plan.sessions,left:plan.sessions,
    price:p.price||p.amount||0,boughtDate:p.date,
    expireDate:expDate.toISOString().split('T')[0],
    log:[{date:p.date,action:'buy'}]
  });
  saveTickets(tickets);
}
function togglePayStatus(id){
  const payments=loadPayments();
  const p=payments.find(p=>p.id===id);
  if(!p) return;
  p.status=p.status==='paid'?'unpaid':'paid';
  savePayments(payments);
  if(p.status==='paid') createTicketFromPayment(p);
  closeSheets(); renderFinance(); renderStudents(); updateBadges();
  toast(p.status==='paid'?`✓ ${p.studentName} 已收款，套票已建立`:'已改為未收款');
}
function markPaid(id){
  const payments=loadPayments();
  const p=payments.find(p=>p.id===id);
  if(!p) return;
  p.status='paid';
  savePayments(payments);
  createTicketFromPayment(p);
  // Sync any existing slot bookings for this student to attendance
  loadSlots().filter(s=>(s.bookings||[]).some(b=>b.name===p.studentName)).forEach(syncSlotToAttendance);
  renderFinance(); renderStudents(); updateBadges();
  toast(`✓ ${p.studentName} 已收款，套票已建立`);
}
function deletePayment(id){
  if(!confirm('確定要刪除此收費紀錄嗎？')) return;
  savePayments(loadPayments().filter(p=>p.id!==id));
  closeSheets(); renderFinance(); updateBadges();
  toast('已刪除收費紀錄');
}

    const nameEl=document.getElementById(`bkct-name-${ti}`);
    const descEl=document.getElementById(`bkct-desc-${ti}`);

      const pp=document.getElementById(`bkct-pp-${ti}-${pi}`);

function bkPlanRowHTML(ti,pi){
  return `<div class="bk-ctype-plan-row" id="bkct-pr-${ti}-${pi}" style="flex-wrap:wrap">
    <input type="number" id="bkct-ps-${ti}-${pi}" placeholder="堂" style="width:46px;flex:none" min="1">
    <input type="text" id="bkct-pn-${ti}-${pi}" placeholder="方案名稱" style="flex:1;min-width:80px">
    <input type="number" id="bkct-pp-${ti}-${pi}" placeholder="總價" style="width:68px;flex:none" min="0">
    <button class="bk-pe-del" onclick="bkDelTypePlan(${ti},${pi})">×</button>
    <div class="bk-plan-extras">
      <div class="bk-validity-wrap">有效<input class="bk-validity-input" type="number" id="bkct-pv-${ti}-${pi}" min="1" max="730">天</div>
      <label class="bk-toggle-row"><span class="bk-toggle"><input type="checkbox" id="bkct-pm-${ti}-${pi}"><span class="bk-toggle-slider"></span></span>可補課</label>
      <label class="bk-toggle-row"><span class="bk-toggle"><input type="checkbox" id="bkct-pf-${ti}-${pi}"><span class="bk-toggle-slider"></span></span>彈性時段</label>
    </div>
  </div>`;
}

function escAttr(s){ return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function bkSyncCtypes(){
  bkEditCtypes = bkEditCtypes.map((t,ti)=>{
    let pi=0; const plans=[];
    while(document.getElementById(`bkct-ps-${ti}-${pi}`)){
      plans.push({
        id: t.plans?.[pi]?.id||(Date.now()+pi),
        sessions: parseInt(document.getElementById(`bkct-ps-${ti}-${pi}`)?.value)||1,
        name: document.getElementById(`bkct-pn-${ti}-${pi}`)?.value||"",
        price: parseInt(document.getElementById(`bkct-pp-${ti}-${pi}`)?.value)||0,
        validDays: parseInt(document.getElementById(`bkct-pv-${ti}-${pi}`)?.value)||180,
        makeup: document.getElementById(`bkct-pm-${ti}-${pi}`)?.checked||false,
        flex: document.getElementById(`bkct-pf-${ti}-${pi}`)?.checked||false,
      });
      pi++;
    }
    return {
      ...t,
      icon: document.getElementById(`bkct-icon-${ti}`)?.value||t.icon||"",
      name: document.getElementById(`bkct-name-${ti}`)?.value||t.name||"",
      desc: document.getElementById(`bkct-desc-${ti}`)?.value||t.desc||"",
      plans,
    };
  });
}

function loadSlots(){ try{return JSON.parse(localStorage.getItem("pilates_slots")||"[]");}catch{return[];} }
function saveSlots(d){ localStorage.setItem("pilates_slots",JSON.stringify(d)); }

const SCH_DAYS=["日","一","二","三","四","五","六"];
let schYear=new Date().getFullYear();
let schMonth=new Date().getMonth();
let schSelectedDate=todayStr();

function schInitCalendar(){
  const cfg=bkLoadCfg();
  const sel=document.getElementById("slot-type");
  if(sel) sel.innerHTML=(cfg.classTypes||[]).map(t=>'<option value="'+t.id+'">'+( t.icon||'')+' '+t.name+'</option>').join('')||'<option value="">（尚未設定課程類型）</option>';
  const rep=document.getElementById("slot-repeat");
  if(rep) rep.onchange=()=>{ document.getElementById("slot-repeat-end-row").style.display=rep.value==="weekly"?"flex":"none"; };
}

function schShiftMonth(n){
  schMonth+=n;
  if(schMonth>11){schMonth=0;schYear++;}
  if(schMonth<0){schMonth=11;schYear--;}
  schRenderCalendar();
}

function schRenderCalendar(){
  // Build year/month selector
  const yearOpts = Array.from({length:5},(_,i)=>{const y=new Date().getFullYear()-1+i; return `<option value="${y}" ${y===schYear?'selected':''}>${y}年</option>`;}).join('');
  const monthOpts = Array.from({length:12},(_,i)=>`<option value="${i}" ${i===schMonth?'selected':''}>${i+1}月</option>`).join('');
  document.getElementById("sch-monthLabel").innerHTML =
    `<select onchange="schYear=parseInt(this.value);schRenderCalendar()" style="border:none;background:transparent;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;outline:none">${yearOpts}</select>` +
    `<select onchange="schMonth=parseInt(this.value);schRenderCalendar()" style="border:none;background:transparent;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;outline:none;margin-left:2px">${monthOpts}</select>`;
  const slots=loadSlots();
  const firstDay=new Date(schYear,schMonth,1).getDay();
  const daysInMonth=new Date(schYear,schMonth+1,0).getDate();
  const today=todayStr();
  let html="";
  SCH_DAYS.forEach(d=>{ html+=`<div class="cal-day-label">${d}</div>`; });
  for(let i=0;i<firstDay;i++){
    const prev=new Date(schYear,schMonth,1-firstDay+i);
    html+=`<div class="cal-day other-month"><div class="cal-day-num">${prev.getDate()}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${schYear}-${String(schMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const daySlots=slots.filter(s=>s.date===ds);
    const isToday=ds===today, isSel=ds===schSelectedDate;
    const dots=daySlots.slice(0,5).map(s=>`<div class="cal-dot ${(s.bookings||[]).length>=(s.capacity||1)?"full":""}"></div>`).join("");
    html+=`<div class="cal-day ${isToday?"today":""} ${isSel?"selected":""}" onclick="schSelectDate('${ds}')">
      <div class="cal-day-num">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }
  document.getElementById("sch-calGrid").innerHTML=html;
  schRenderDayPanel();
}


/* Sync slot bookings → pilates_classes for attendance tracking */
function syncSlotToAttendance(slot){
  if(!slot||!(slot.bookings||[]).length) return;
  const classes=loadClasses();
  const existingIdx=classes.findIndex(c=>c.slotId===slot.id);
  const students=loadStudents();
  const cfg=bkLoadCfg();
  const type=cfg.classTypes?.find(t=>String(t.id)===String(slot.typeId));
  const className=(type?(type.icon||'')+' '+type.name:'課程');
  // Build members — preserve existing status if already set
  const existingMembers=existingIdx>=0?classes[existingIdx].members:[];
  const members=slot.bookings.map(b=>{
    const stu=students.find(s=>s.name.trim()===b.name.trim());
    const prev=existingMembers.find(m=>m.studentName===b.name);
    return {
      studentId:stu?stu.id:('ext-'+b.name.replace(/\s/g,'-')),
      studentName:b.name,
      color:stu?stu.color||'c0':'c0',
      status:prev?prev.status:'pending'
    };
  });
  if(existingIdx>=0){
    classes[existingIdx].members=members;
    classes[existingIdx].name=className;
    classes[existingIdx].time=slot.time;
    classes[existingIdx].saved=classes[existingIdx].saved||false;
  } else {
    classes.push({
      id:'slot-'+slot.id,
      slotId:slot.id,
      date:slot.date,
      name:className,
      time:slot.time,
      location:slot.location||'',
      saved:true,
      members
    });
  }
  saveClasses(classes);
}

function schSelectDate(ds){
  schSelectedDate=ds;
  schRenderCalendar();
}

function schRenderDayPanel(){
  const slots=loadSlots().filter(s=>s.date===schSelectedDate).sort((a,b)=>a.time.localeCompare(b.time));
  const cfg=bkLoadCfg();
  const d=new Date(schSelectedDate+"T00:00:00");
  const label=`${d.getMonth()+1}月${d.getDate()}日（${SCH_DAYS[d.getDay()]}）`;
  let html=`<div style="font-size:13px;font-weight:500;color:var(--ink-mid);padding:12px 0 8px">${label}</div>`;
  if(slots.length){
    html+=slots.map(s=>{
      const type=cfg.classTypes?.find(t=>String(t.id)===String(s.typeId));
      const bookings=s.bookings||[], cap=s.capacity||1, full=bookings.length>=cap;
      const names=bookings.length
        ? bookings.map(b=>b.name+(b.phone?' ('+b.phone+')':'')).join('、')
        : '（尚無預約）';
      return `<div class="sch-slot-card" onclick="schOpenEditSlot('${s.id}')">
        <div class="sch-slot-time">${s.time}</div>
        <div class="sch-slot-body">
          <div class="sch-slot-name">${type?(type.icon||"")+" "+type.name:"課程"}</div>
          <div class="sch-slot-meta">${s.duration||60}分鐘${s.location?" · "+s.location:""}</div>
          <div class="sch-slot-meta" style="margin-top:3px;color:var(--sage)">${names}</div>
        </div>
        <div class="sch-slot-spots ${full?"full":"ok"}">${bookings.length}/${cap}</div>
      </div>`;
    }).join("");
  } else {
    html+=`<div style="text-align:center;padding:24px 0;color:var(--ink-light);font-size:13px">這天還沒有課程時段</div>`;
  }
  html+=`<button class="sch-add-slot-btn" onclick="schOpenAddSlot()">＋ 新增 ${label} 的課程時段</button>`;
  document.getElementById("sch-dayPanel").innerHTML=html;
}

function schOpenAddSlot(){
  schInitCalendar();
  document.getElementById("slot-date").value=schSelectedDate;
  document.getElementById("slot-time").value="09:00";
  document.getElementById("slot-duration").value="60";
  document.getElementById("slot-capacity").value="1";
  document.getElementById("slot-loc").value="";
  document.getElementById("slot-repeat").value="none";
  document.getElementById("slot-repeat-end-row").style.display="none";
  document.getElementById("slot-edit-id").value="";

  document.getElementById("slot-del-btn").style.display="none";

}

function schOpenEditSlot(slotId){
  const s=loadSlots().find(s=>s.id===slotId);
  if(!s) return;
  schInitCalendar();
  document.getElementById("slot-date").value=s.date;
  document.getElementById("slot-time").value=s.time;
  document.getElementById("slot-duration").value=s.duration||60;
  const typeEl=document.getElementById("slot-type");
  if(typeEl) typeEl.value=s.typeId||"";
  document.getElementById("slot-capacity").value=s.capacity||1;
  document.getElementById("slot-loc").value=s.location||"";
  document.getElementById("slot-repeat").value="none";
  document.getElementById("slot-repeat-end-row").style.display="none";
  document.getElementById("slot-edit-id").value=slotId;
  document.getElementById("slotSheetTitle").textContent="編輯時段";
  document.getElementById("slot-del-btn").style.display="block";
  openSheet("sheet-slotAdd");
}

function schSaveSlot(){
  const date=document.getElementById("slot-date").value;
  const time=document.getElementById("slot-time").value;
  const duration=parseInt(document.getElementById("slot-duration").value)||60;
  const typeId=document.getElementById("slot-type")?.value||"";
  const capacity=parseInt(document.getElementById("slot-capacity").value)||1;
  const location=document.getElementById("slot-loc").value.trim();
  const repeat=document.getElementById("slot-repeat").value;
  const repeatEnd=document.getElementById("slot-repeat-end").value;
  const editId=document.getElementById("slot-edit-id").value;
  if(!date||!time){ toast("請填寫日期與時間"); return; }
  const oldBookings=editId?(loadSlots().find(s=>s.id===editId)?.bookings||[]):[];
  let slots=loadSlots().filter(s=>s.id!==editId);
  if(repeat==="weekly"&&repeatEnd&&repeatEnd>date){
    let cur=new Date(date+"T00:00:00");
    const end=new Date(repeatEnd+"T00:00:00");
    while(cur<=end){
      const ds=cur.toISOString().split("T")[0];
      slots.push({id:`${ds}-${time}-${Date.now()+Math.random()*1000|0}`,date:ds,time,duration,typeId,capacity,location,bookings:[]});
      cur.setDate(cur.getDate()+7);
    }
  } else {
    slots.push({id:editId||`${date}-${time}-${Date.now()}`,date,time,duration,typeId,capacity,location,bookings:oldBookings});
  }
  saveSlots(slots);
  // sync any booked slots to attendance classes
  slots.filter(s=>s.date>=date&&(s.bookings||[]).length>0).forEach(syncSlotToAttendance);
  closeSheets();
  schRenderCalendar();
  toast("✓ 時段已儲存");
}

function schDeleteSlot(){
  const editId=document.getElementById("slot-edit-id").value;
  if(!editId||!confirm("確定要刪除此時段嗎？")) return;
  saveSlots(loadSlots().filter(s=>s.id!==editId));
  // Also remove the corresponding attendance class
  const updatedClasses=loadClasses().filter(c=>c.slotId!==editId);
  saveClasses(updatedClasses);
  closeSheets();
  schRenderCalendar();
  toast("已刪除時段及對應課堂");
}
